# This file contains the base site structure 
# for my quarto websites.
# _theme/shared-base.yml

format:
  html:
    respect-user-color-scheme: true
    theme:
      light:
        - cosmo
        - brand
        - _theme/styles.scss
      dark: 
        - slate
        - brand
        - _theme/styles.scss
    html-math-method: mathjax

execute:
  enabled: true
  freeze: auto

navbar:
  right:
    - text: About
      href: https://matthewheun.com/about
    - text: Awards
      href: https://matthewheun.com/awards
    - text: Publications
      href: https://matthewheun.com/works/publications
    - text: Presentations
      href: https://matthewheun.com/works/presentations
    - text: Posts
      href: https://matthewheun.com/posts
    - text: Retired blogs
      href: https://matthewheun.com/retired_blogs/
    - text: CV
      href: https://matthewheun.com/files/Heun_CV.pdf

